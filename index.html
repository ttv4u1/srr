<!DOCTYPE html>
<html lang="ms-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kad Mencatat Waktu & Log Perjalanan Kenderaan v2.0.0</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23003DA5' width='50' height='100'/><rect fill='%23FCD116' x='50' width='50' height='100'/><circle cx='25' cy='50' r='20' fill='%23FFCC00'/><path d='M50 20 L55 35 L70 35 L58 45 L63 60 L50 50 L37 60 L42 45 L30 35 L45 35 Z' fill='%23FFF'/></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #003DA5;
            --secondary: #FCD116;
            --accent: #FF6B35;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --light: #f8f9fa;
            --dark: #212529;
            --border-radius: 8px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            background-attachment: fixed;
            color: var(--dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Section */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #0056b3 100%);
            color: white;
            padding: 30px 20px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400"><defs><pattern id="pattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse"><rect fill="rgba(255,255,255,0.02)" width="200" height="200"/><path fill="rgba(255,255,255,0.05)" d="M0,100 Q50,50 100,100 T200,100"/></pattern></defs><rect width="1200" height="400" fill="url(%23pattern)"/></svg>');
            pointer-events: none;
        }

        .header-content {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 30px;
            position: relative;
            z-index: 1;
        }

        .logo-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: var(--transition);
        }

        .logo:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .header-text h1 {
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .header-text p {
            font-size: 14px;
            opacity: 0.95;
        }

        .clock-widget {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            text-align: right;
            min-width: 200px;
        }

        .clock-time {
            font-size: 24px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        .clock-date {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Navigation */
        nav.main-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 24px;
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-size: 14px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 61, 165, 0.3);
        }

        /* Content Sections */
        .content-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 61, 165, 0.1);
            background: #f0f6ff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Button Styles */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #0056b3 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 61, 165, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--dark);
        }

        .btn-secondary:hover {
            background: #e6b800;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 209, 22, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #20c997 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #c82333 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.3);
        }

        .btn-warning {
            background: var(--warning);
            color: var(--dark);
        }

        .btn-warning:hover {
            background: #e0a800;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.3);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: linear-gradient(135deg, var(--primary) 0%, #0056b3 100%);
            color: white;
        }

        th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: #f8f9ff;
        }

        tbody tr:nth-child(even) {
            background: #f5f7fa;
        }

        .table-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-ot {
            background: #ffe0e0;
            color: var(--danger);
        }

        .badge-normal {
            background: #e0ffe0;
            color: var(--success);
        }

        .badge-late {
            background: #ffe0b0;
            color: #ff6b00;
        }

        /* Time Card Section */
        .time-card-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .time-card-container {
                grid-template-columns: 1fr;
            }
        }

        .time-card-section {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .time-card-header {
            background: linear-gradient(135deg, var(--primary) 0%, #0056b3 100%);
            color: white;
            padding: 20px;
            font-weight: 700;
            font-size: 16px;
        }

        .time-card-content {
            padding: 20px;
        }

        /* Upload Section */
        .upload-zone {
            border: 3px dashed var(--primary);
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
            background: #f8f9ff;
        }

        .upload-zone:hover {
            background: #eef2ff;
            border-color: #0056b3;
        }

        .upload-zone.dragover {
            background: #e0ebff;
            border-color: var(--accent);
        }

        .upload-zone-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-zone-text {
            margin-bottom: 10px;
        }

        .upload-zone-text strong {
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
        }

        .upload-zone-text small {
            color: #666;
        }

        #fileInput {
            display: none;
        }

        /* Gallery/Media Section */
        .media-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .media-item {
            position: relative;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #f5f5f5;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .media-item:hover {
            transform: scale(1.05);
        }

        .media-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-item-delete {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
        }

        .media-item-delete:hover {
            background: #c82333;
            transform: scale(1.1);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: var(--border-radius);
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
            padding: 30px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--danger);
        }

        /* Alert Styles */
        .alert {
            padding: 15px 20px;
            border-radius: var(--border-radius);
            margin-bottom: 15px;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-color: var(--success);
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-color: var(--danger);
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border-color: var(--warning);
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-color: #bee5eb;
        }

        /* Language Toggle */
        .lang-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
            z-index: 500;
            font-weight: bold;
            color: var(--primary);
            font-size: 16px;
        }

        .lang-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }

        /* Profile Autohide */
        .profile-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            z-index: 499;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
            max-width: 250px;
        }

        .profile-widget.hidden {
            transform: translateX(calc(100% + 20px));
            opacity: 0;
            pointer-events: none;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .profile-info small {
            display: block;
            color: #666;
            font-size: 12px;
        }

        .profile-info strong {
            color: var(--primary);
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
            }

            .main-nav, .lang-toggle, .profile-widget, .btn-group {
                display: none;
            }

            .card {
                page-break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            header {
                padding: 20px 15px;
            }

            .header-content {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .clock-widget {
                text-align: center;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            nav.main-nav {
                flex-direction: column;
            }

            .nav-btn {
                width: 100%;
            }
        }

        /* Status Indicators */
        .status-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-badge.online {
            background: var(--success);
        }

        .status-badge.offline {
            background: #999;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Late Time Highlight */
        .time-late {
            background: #ffe0e0;
            color: var(--danger);
            font-weight: 600;
        }

        .time-ot {
            background: #fff3cd;
            color: #856404;
            font-weight: 600;
        }

        /* Vehicle Log Specific */
        .odometer-calculation {
            background: #eef2ff;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            border-left: 4px solid var(--primary);
        }

        .odometer-calculation strong {
            color: var(--primary);
        }

        .cost-summary {
            background: linear-gradient(135deg, #e0ffe0 0%, #d4edda 100%);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-top: 20px;
            border: 2px solid var(--success);
        }

        .cost-summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .cost-summary-item strong {
            color: var(--primary);
        }

        .cost-summary-total {
            border-top: 2px solid var(--success);
            padding-top: 12px;
            margin-top: 12px;
            font-size: 18px;
            font-weight: 700;
            color: var(--success);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .empty-state p {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Profile Widget -->
    <div class="profile-widget" id="profileWidget">
        <div class="profile-avatar" id="profileAvatar">TT</div>
        <div class="profile-info">
            <strong id="profileName">Pengguna</strong>
            <small id="profileDept">Jabatan</small>
        </div>
    </div>

    <!-- Language Toggle -->
    <button class="lang-toggle" id="langToggle" title="Tukar Bahasa / Change Language">EN / MS</button>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="logo-group">
                    <div class="logo" title="Jata Negara Malaysia">🇲🇾</div>
                    <div class="logo" title="Logo Jabatan">🏛️</div>
                    <div class="logo" title="Logo Penguatkuasaan">⚖️</div>
                </div>
                <div class="header-text">
                    <h1 data-ms="Sistem Kad Mencatat Waktu & Log Perjalanan Kenderaan" data-en="Time Card & Vehicle Log Management System"></h1>
                    <p data-ms="Versi 2.0.0 Premium - Sistem Pengurusan Waktu dan Perjalanan Kenderaan" data-en="Version 2.0.0 Premium - Professional Time & Vehicle Management"></p>
                </div>
                <div class="clock-widget">
                    <div class="clock-time" id="clockTime">00:00:00</div>
                    <div class="clock-date" id="clockDate">Isnin, 1 Mei 2026</div>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="main-nav">
            <button class="nav-btn active" onclick="switchSection('timecard')"
                    data-ms="Kad Mencatat Waktu" data-en="Time Card"></button>
            <button class="nav-btn" onclick="switchSection('vehiclelog')"
                    data-ms="Log Perjalanan" data-en="Vehicle Log"></button>
            <button class="nav-btn" onclick="switchSection('uploads')"
                    data-ms="Muatan Naik" data-en="Uploads"></button>
            <button class="nav-btn" onclick="switchSection('reports')"
                    data-ms="Laporan & Data" data-en="Reports & Data"></button>
            <button class="nav-btn" onclick="switchSection('settings')"
                    data-ms="Tetapan" data-en="Settings"></button>
        </nav>

        <!-- TIME CARD SECTION -->
        <section id="timecard" class="content-section active">
            <div class="time-card-container">
                <!-- Card Side A (1-15) -->
                <div class="time-card-section">
                    <div class="time-card-header">📋 <span data-ms="Muka A (Hari 1-15)" data-en="Side A (Days 1-15)"></span></div>
                    <div class="time-card-content">
                        <div class="form-grid">
                            <div class="form-group">
                                <label data-ms="Nama" data-en="Name"></label>
                                <input type="text" id="cardA_name" placeholder="Nama Penuh / Full Name">
                            </div>
                            <div class="form-group">
                                <label data-ms="Cawangan/Jabatan" data-en="Branch/Department"></label>
                                <input type="text" id="cardA_dept" placeholder="Cawangan/Jabatan">
                            </div>
                            <div class="form-group">
                                <label data-ms="Bahagian/Seksyen" data-en="Division/Section"></label>
                                <input type="text" id="cardA_section" placeholder="Bahagian/Seksyen">
                            </div>
                            <div class="form-group">
                                <label data-ms="Bulan" data-en="Month"></label>
                                <input type="month" id="cardA_month">
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table id="tableCardA">
                                <thead>
                                    <tr>
                                        <th data-ms="Bil" data-en="No"></th>
                                        <th data-ms="Tarikh" data-en="Date"></th>
                                        <th data-ms="Masuk 1" data-en="In 1"></th>

    <!-- SCRIPTS -->
    <script>
        // ============== LOCALIZATION ==============
        const translations = {
            ms: {},
            en: {}
        };

        let currentLang = localStorage.getItem('language') || 'ms';

        // Initialize translations from HTML
        document.querySelectorAll('[data-ms][data-en]').forEach(el => {
            const ms = el.getAttribute('data-ms');
            const en = el.getAttribute('data-en');
            if (ms) translations.ms[ms] = ms;
            if (en) translations.en[en] = en;
        });

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            updateLanguage();
        }

        function updateLanguage() {
            document.querySelectorAll('[data-ms][data-en]').forEach(el => {
                const ms = el.getAttribute('data-ms');
                const en = el.getAttribute('data-en');
                el.textContent = currentLang === 'ms' ? ms : en;
            });
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            const newLang = currentLang === 'ms' ? 'en' : 'ms';
            setLanguage(newLang);
            document.getElementById('langToggle').textContent = newLang === 'ms' ? 'EN / MS' : 'MS / EN';
        });

        // ============== CLOCK & TIME ==============
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('ms-MY', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const date = now.toLocaleDateString('ms-MY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('clockTime').textContent = time;
            document.getElementById('clockDate').textContent = date;
        }

        updateClock();
        setInterval(updateClock, 1000);

        // ============== SECTION SWITCHING ==============
        function switchSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }

        // ============== PROFILE WIDGET ==============
        function updateProfileWidget() {
            const name = localStorage.getItem('userName') || 'Pengguna';
            const dept = localStorage.getItem('userDept') || 'Jabatan';
            document.getElementById('profileName').textContent = name;
            document.getElementById('profileDept').textContent = dept;
            document.getElementById('profileAvatar').textContent = name.substring(0, 2).toUpperCase();
        }

        updateProfileWidget();

        // ============== TIME CARD FUNCTIONS ==============
        function generateCardA() {
            const tbody = document.getElementById('bodyCardA');
            tbody.innerHTML = '';
            const daysInMonth = new Date(2026, 4, 0).getDate();
            
            for (let i = 1; i <= 15; i++) {
                if (i > daysInMonth) break;
                const row = `
                    <tr>
                        <td>${i}</td>
                        <td><input type="date" class="cardA-date" value="2026-05-0${i.toString().padStart(2, '0')}" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="time" class="cardA-in1" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="time" class="cardA-out1" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="time" class="cardA-in2" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="time" class="cardA-out2" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="text" class="cardA-remarks" placeholder="Kenyataan" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><span class="cardA-ot">-</span></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            }
            showAlert(currentLang === 'ms' ? 'Jadual Jana Selesai' : 'Table Generated Successfully', 'success');
        }

        function generateCardB() {
            const tbody = document.getElementById('bodyCardB');
            tbody.innerHTML = '';
            const daysInMonth = 31;
            
            for (let i = 16; i <= daysInMonth; i++) {
                const row = `
                    <tr>
                        <td>${i}</td>
                        <td><input type="date" class="cardB-date" value="2026-05-${i.toString().padStart(2, '0')}" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="time" class="cardB-in1" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="time" class="cardB-out1" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="time" class="cardB-in2" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="time" class="cardB-out2" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><input type="text" class="cardB-remarks" placeholder="Kenyataan" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></td>
                        <td><span class="cardB-ot">-</span></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            }
            showAlert(currentLang === 'ms' ? 'Jadual Jana Selesai' : 'Table Generated Successfully', 'success');
        }

            window.print();
        }

        function printCardB() {
            window.print();
        }

        function exportCardA() {
            exportToCSV('cardA_name', 'TimeCard_A');
        }

        function exportCardB() {
            exportToCSV('cardB_name', 'TimeCard_B');
        }

        // ============== VEHICLE LOG FUNCTIONS ==============
        let travelRecords = [];

        function addTravelRecord() {
            const record = {
                id: Date.now(),
                date: document.getElementById('travelDate').value,
                timeOut: document.getElementById('travelTimeOut').value,
                timeIn: document.getElementById('travelTimeIn').value,
                driver: document.getElementById('travelDriver').value,
                purpose: document.getElementById('travelPurpose').value,
                approval: document.getElementById('travelApproval').value,
                user: document.getElementById('travelUser').value,
                odoStart: parseFloat(document.getElementById('travelOdoStart').value) || 0,
                odoEnd: parseFloat(document.getElementById('travelOdoEnd').value) || 0,
                distance: parseFloat(document.getElementById('travelDistance').value) || 0,
                cost: parseFloat(document.getElementById('travelCost').value) || 0,
                receiptNo: document.getElementById('travelReceiptNo').value,
                liters: parseFloat(document.getElementById('travelLiters').value) || 0,
                notes: document.getElementById('travelNotes').value
            };

            travelRecords.push(record);
            localStorage.setItem('travelRecords', JSON.stringify(travelRecords));
            clearTravelForm();
            renderTravelTable();
            updateTravelSummary();
            showAlert(currentLang === 'ms' ? 'Rekod Ditambah' : 'Record Added', 'success');
        }

        function clearTravelForm() {
            document.getElementById('travelDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('travelTimeOut').value = '';
            document.getElementById('travelTimeIn').value = '';
            document.getElementById('travelDriver').value = '';
            document.getElementById('travelPurpose').value = '';
            document.getElementById('travelApproval').value = '';
            document.getElementById('travelUser').value = '';
            document.getElementById('travelOdoStart').value = '';
            document.getElementById('travelOdoEnd').value = '';
            document.getElementById('travelDistance').value = '';
            document.getElementById('travelCost').value = '';
            document.getElementById('travelReceiptNo').value = '';
            document.getElementById('travelLiters').value = '';
            document.getElementById('travelNotes').value = '';
        }

        function renderTravelTable() {
            const tbody = document.getElementById('travelTableBody');
            tbody.innerHTML = '';

            if (travelRecords.length === 0) {
                tbody.innerHTML = `<tr><td colspan="12" style="text-align:center; color:#999;">${currentLang === 'ms' ? 'Tiada rekod' : 'No records'}</td></tr>`;
                return;
            }

            travelRecords.forEach((record, index) => {
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${record.date}</td>
                        <td>${record.timeOut}</td>
                        <td>${record.timeIn}</td>
                        <td>${record.driver}</td>
                        <td>${record.purpose}</td>
                        <td>${record.odoStart}</td>
                        <td>${record.odoEnd}</td>
                        <td>${record.distance}</td>
                        <td>RM ${record.cost.toFixed(2)}</td>
                        <td>${record.liters.toFixed(2)}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteTravelRecord(${record.id})">✕</button></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function deleteTravelRecord(id) {
            travelRecords = travelRecords.filter(r => r.id !== id);
            localStorage.setItem('travelRecords', JSON.stringify(travelRecords));
            renderTravelTable();
            updateTravelSummary();
            showAlert(currentLang === 'ms' ? 'Rekod Dipadam' : 'Record Deleted', 'success');
        }

        function updateTravelSummary() {
            const totalDistance = travelRecords.reduce((sum, r) => sum + r.distance, 0);
            const totalCost = travelRecords.reduce((sum, r) => sum + r.cost, 0);
            const totalLiters = travelRecords.reduce((sum, r) => sum + r.liters, 0);

            document.getElementById('totalDistance').textContent = `${totalDistance} KM`;
            document.getElementById('totalCost').textContent = `RM ${totalCost.toFixed(2)}`;
            document.getElementById('totalLiters').textContent = `${totalLiters.toFixed(2)} Liter`;
            document.getElementById('grandTotal').textContent = `RM ${totalCost.toFixed(2)}`;
        }

        // Auto-calculate distance when odometer values change
        document.getElementById('travelOdoStart').addEventListener('change', updateDistance);
        document.getElementById('travelOdoEnd').addEventListener('change', updateDistance);

        function updateDistance() {
            const start = parseFloat(document.getElementById('travelOdoStart').value) || 0;
            const end = parseFloat(document.getElementById('travelOdoEnd').value) || 0;
            const distance = end - start;
            document.getElementById('travelDistance').value = distance > 0 ? distance : 0;
        }

        function printVehicleLog() {
            window.print();
        }

        function exportVehicleLog(format) {
            if (format === 'csv') {
                exportToCSV('vehicleReg', `VehicleLog_${new Date().toISOString().split('T')[0]}`);
            } else if (format === 'excel') {
                showAlert(currentLang === 'ms' ? 'Fungsi Excel sedang dibangunkan' : 'Excel function in development', 'warning');
            } else if (format === 'access') {
                showAlert(currentLang === 'ms' ? 'Fungsi Access DB sedang dibangunkan' : 'Access DB function in development', 'warning');
            }
        }

        // ============== FILE UPLOAD FUNCTIONS ==============
        const uploadData = {
            fuelReceipt: [],
            tngReceipt: [],
            odometer: []
        };

        function handleDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('dragover');
        }

        function handleDragLeave(event) {
            event.currentTarget.classList.remove('dragover');
        }

        function handleDrop(event, type) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
            const files = event.dataTransfer.files;
            processFiles(files, type);
        }

        function handleFileSelect(event, type) {
            const files = event.target.files;
            processFiles(files, type);
        }

        function processFiles(files, type) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const item = {
                        id: Date.now() + Math.random(),
                        name: file.name,
                        data: e.target.result,
                        type: file.type,
                        size: file.size,
                        uploadDate: new Date().toISOString()
                    };
                    uploadData[type].push(item);
                    localStorage.setItem(`upload_${type}`, JSON.stringify(uploadData[type]));
                    renderGallery(type);
                    showAlert(currentLang === 'ms' ? `Fail: ${file.name} dimuat naik` : `File: ${file.name} uploaded`, 'success');
                };
                reader.readAsDataURL(file);
            });
        }

        function renderGallery(type) {
            const galleryId = `${type}Gallery`;
            const gallery = document.getElementById(galleryId);
            gallery.innerHTML = '';

            uploadData[type].forEach(item => {
                const isImage = item.type.startsWith('image/');
                const thumb = `
                    <div class="media-item">
                        ${isImage ? `<img src="${item.data}" alt="${item.name}">` : `<div style="font-size:48px; text-align:center;">📄</div>`}
                        <button class="media-item-delete" onclick="deleteUpload('${type}', ${item.id})">✕</button>
                    </div>
                `;
                gallery.innerHTML += thumb;
            });
        }

        function deleteUpload(type, id) {
            uploadData[type] = uploadData[type].filter(item => item.id !== id);
            localStorage.setItem(`upload_${type}`, JSON.stringify(uploadData[type]));
            renderGallery(type);
            showAlert(currentLang === 'ms' ? 'Fail dipadam' : 'File deleted', 'success');
        }

        // ============== SETTINGS FUNCTIONS ==============
        function saveSettings() {
            const name = document.getElementById('settingName').value || 'Pengguna';
            const dept = document.getElementById('settingDept').value || 'Jabatan';
            const section = document.getElementById('settingSection').value;
            const email = document.getElementById('settingEmail').value;

            localStorage.setItem('userName', name);
            localStorage.setItem('userDept', dept);
            localStorage.setItem('userSection', section);
            localStorage.setItem('userEmail', email);

            updateProfileWidget();
            showAlert(currentLang === 'ms' ? 'Tetapan Disimpan' : 'Settings Saved', 'success');
        }

        function clearAllData() {
            if (confirm(currentLang === 'ms' ? 'Adakah anda pasti? Semua data akan dihapus.' : 'Are you sure? All data will be deleted.')) {
                localStorage.clear();
                location.reload();
            }
        }

        // ============== UTILITY FUNCTIONS ==============
        function showAlert(message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            document.body.insertBefore(alert, document.body.firstChild);
            setTimeout(() => alert.remove(), 3000);
        }

        function exportToCSV(filename, name) {
            const csv = 'Name,Department,Section,Month,Date,In 1,Out 1,In 2,Out 2,Remarks,OT\n';
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv));
            element.setAttribute('download', `${name}_${new Date().toISOString().split('T')[0]}.csv`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            showAlert(currentLang === 'ms' ? 'Data Dieksport' : 'Data Exported', 'success');
        }

        // ============== LOAD DATA ==============
        function loadAllData() {
            const savedRecords = localStorage.getItem('travelRecords');
            if (savedRecords) {
                travelRecords = JSON.parse(savedRecords);
                renderTravelTable();
                updateTravelSummary();
            }

            const uploadTypes = ['fuelReceipt', 'tngReceipt', 'odometer'];
            uploadTypes.forEach(type => {
                const saved = localStorage.getItem(`upload_${type}`);
                if (saved) {
                    uploadData[type] = JSON.parse(saved);
                    renderGallery(type);
                }
            });

            const savedName = localStorage.getItem('userName');
            const savedDept = localStorage.getItem('userDept');
            if (savedName) document.getElementById('settingName').value = savedName;
            if (savedDept) document.getElementById('settingDept').value = savedDept;
        }

        loadAllData();
        updateLanguage();
    </script>
</body>
</html>
